<script>
const B=[{"id": "munemasa", "name": "宗政酒造", "brand": "のんのこ", "type": "麦焼酎", "area": "有田町", "founded": "1985", "founded_era": "昭和60年", "desc": "昭和60年（1985年）、伊万里市にて焼酎造りを開始。平成14年に有田ポーセリンパーク内に本社工場を移転し観光酒蔵として営業。佐賀産二条大麦100%の麦焼酎「のんのこ」を代表銘柄とする。", "main_ingredient": "barley", "koji_type": ""}, {"id": "mitsutake", "name": "光武酒造場", "brand": "魔界への誘い", "type": "芋焼酎", "area": "鹿島市", "founded": "1688", "founded_era": "元禄元年", "desc": "元禄元年（1688年）創業。肥前浜宿酒蔵通りに蔵を構え、300年以上の歴史を持つ老舗。「酒造りは人づくり」の信念で伝統と革新の酒造りを行う。", "main_ingredient": "sweet_potato", "koji_type": "黒麹"}, {"id": "tenzan", "name": "天山酒造", "brand": "天山", "type": "麦焼酎", "area": "小城市", "founded": "1875", "founded_era": "明治8年", "desc": "明治8年（1875年）に日本酒造りを開始。元々は1861年創業の水車業から始まる。日本酒「天山」「七田」のほか焼酎も製造。", "main_ingredient": "barley", "koji_type": ""}, {"id": "saga_shuzo", "name": "佐嘉酒造", "brand": "窓乃梅", "type": "麦焼酎", "area": "佐賀市", "founded": "1688", "founded_era": "元禄元年", "desc": "元禄元年（1688年）創業。佐賀県最古の酒蔵。2022年に「窓乃梅酒造」から「佐嘉酒造」に社名変更。シェリー樽で長期熟成した樽焼酎も製造。", "main_ingredient": "barley", "koji_type": ""}, {"id": "amabuki", "name": "天吹酒造", "brand": "天吹", "type": "麦焼酎", "area": "みやき町", "founded": "1704", "founded_era": "宝永元年", "desc": "元禄年間（1688-1704年）に創業した300年以上の歴史を持つ老舗蔵。国の登録有形文化財の築100年以上の酒蔵で酒造りを行う。", "main_ingredient": "barley", "koji_type": ""}, {"id": "gochoda", "name": "五町田酒造", "brand": "東一", "type": "麦焼酎", "area": "嬉野市", "founded": "1922", "founded_era": "大正11年", "desc": "大正11年（1922年）創業。「東洋一の酒を目指す」という願いを込めた銘柄「東一」で知られる。佐賀県産原料にこだわり、山田錦の自家栽培にも早くから取り組む。", "main_ingredient": "barley", "koji_type": ""}, {"id": "matsuuraichi", "name": "松浦一酒造", "brand": "松浦一", "type": "麦焼酎", "area": "伊万里市", "founded": "1716", "founded_era": "正徳6年", "desc": "正徳6年（1716年）創業。松浦地方で一番になりたいという願いを銘柄に込め、308年以上にわたり酒を造り続ける老舗。", "main_ingredient": "barley", "koji_type": ""}, {"id": "baba", "name": "馬場酒造場", "brand": "能古見", "type": "麦焼酎", "area": "鹿島市", "founded": "1795", "founded_era": "寛政7年", "desc": "寛政7年（1795年）創業。8代目当主・馬場一郎氏が代表兼杜氏として日本酒造りの伝統を継承。年間約370石の小規模蔵ながら、地元農家との連携で佐賀県産米にこだわる。", "main_ingredient": "barley", "koji_type": ""}, {"id": "sachihime", "name": "幸姫酒造", "brand": "幸姫", "type": "麦焼酎", "area": "鹿島市", "founded": "1934", "founded_era": "昭和9年", "desc": "昭和9年（1934年）創業。祐徳稲荷神社の御神酒指定醸造元。創業90年の歴史を持ち、最高峰の酒造りを追求。観光酒蔵の先駆けとして蔵見学・試飲を提供。", "main_ingredient": "barley", "koji_type": ""}, {"id": "kiyama", "name": "基山商店", "brand": "基峰鶴", "type": "麦焼酎", "area": "基山町", "founded": "1920", "founded_era": "大正9年", "desc": "明治初期に近隣の地主数名で酒造りを始め、大正9年（1920年）に法人化。佐賀県と福岡県の県境に蔵を構える。2020年に創業100周年を迎えた。", "main_ingredient": "barley", "koji_type": ""}];
const ILABELS={'sweet_potato':'芋','barley':'麦','rice':'米','brown_sugar':'黒糖','buckwheat':'そば','awamori':'泡盛','kasutori':'粕取り','mixed':'混和'};
const areas=[...new Set(B.map(b=>b.area).filter(Boolean))].sort();
const types=[...new Set(B.map(b=>b.main_ingredient).filter(Boolean))];
let curArea='',curType='';
function renderFilters(){
  const f=document.getElementById('filters');
  let h='<button class="filter-btn active" onclick="curArea=\'\';curType=\'\';renderFilters();render()">すべて</button>';
  if(types.length>1)types.forEach(t=>{h+='<button class="filter-btn'+(curType===t?' active':'')+'" onclick="curType=curType===\''+t+'\'?\'\':'+JSON.stringify(t)+';curArea=\'\';renderFilters();render()">'+((ILABELS[t]||t))+'</button>';});
  if(areas.length>1)areas.forEach(a=>{h+='<button class="filter-btn'+(curArea===a?' active':'')+'" onclick="curArea=curArea===\''+a.replace(/'/g,"\\'")+'\' ?\'\':'+JSON.stringify(a)+';curType=\'\';renderFilters();render()">'+a+'</button>';});
  f.innerHTML=h;
}
function render(){
  const g=document.getElementById('grid');
  const filtered=B.filter(b=>(!curArea||b.area===curArea)&&(!curType||b.main_ingredient===curType));
  if(!filtered.length){g.innerHTML='<div class="empty">該当する蒸留所がありません</div>';return;}
  g.innerHTML=filtered.map(b=>{
    const tags=[];
    if(b.main_ingredient&&ILABELS[b.main_ingredient])tags.push(ILABELS[b.main_ingredient]);
    if(b.koji_type)tags.push(b.koji_type);
    return '<a class="card" href="/shochu/saga/'+b.id+'.html">'+
      '<div class="card-name">'+b.name+'</div>'+
      (b.brand?'<div class="card-brand">'+b.brand+'</div>':'')+
      '<div class="card-meta">'+(b.area||'')+(b.founded?' ・ 創業'+b.founded+'年':'')+'</div>'+
      (b.desc?'<div class="card-desc">'+b.desc+'</div>':'')+
      (tags.length?'<div class="card-tags">'+tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>':'')+
    '</a>';
  }).join('');
}
renderFilters();render();
</script>
